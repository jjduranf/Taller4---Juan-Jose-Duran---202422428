<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h2>Cursos Actuales</h2>
                <table class="table">
                    <thead class="thead-dark">
                        <tr>
                            <th>id</th>
                            <th>Nombre</th>
                            <th>Canal</th>
                            <th>Temporadas</th>
                        </tr>
                    </thead>
                    <tbody id="series"></tbody>
                </table>
                <div id="prom-seasons"></div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <img id="poster" class="card-img-top" alt="Poster de la serie">
                    <div class="card-body">
                        <h3 id="serie-name">Nombre: -</h3>
                        <p id="serie-description">Descripción: -</p>
                        <p id="serie-channel">Canal: -</p>
                        <p id="serie-seasons">Temporadas: -</p>
                        <div id="serie-link">
                            <a href="#" class="btn btn-primary" target="_blank">Ver más</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/scripts/main.js" type="module"></script>
</body>

</html>
